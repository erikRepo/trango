[package]
name = "trango"
version.workspace = true
edition.workspace = true
rust-version.workspace = true

[[bin]]
name = "trango"
path = "src/main.rs"

[dependencies]
anyhow = "1"
libmpv2 = { version = "6", features = ["render"] }
playback-state = { path = "../playback-state" }
slint = "1.17.1"
tracing = "0.1"
tracing-subscriber = "0.3"

[build-dependencies]
slint-build = "1.17.1"
